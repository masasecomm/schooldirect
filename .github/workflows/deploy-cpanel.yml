name: Deploy to production

# Deploys dist/ to cPanel via FTP on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you redeploying? (optional note for the run log)"
        required: false
        default: "Manual redeploy"
      clean_slate:
        description: "Wipe remote folder before upload? (use only if site is broken)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-and-deploy:
    name: Build & deploy to cPanel
    runs-on: ubuntu-latest
    env:
      # Opt into Node.js 24 for all JavaScript actions in this job.
      # Silences the "Node.js 20 actions are deprecated" warning until
      # action authors publish Node 24 builds.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Show trigger info
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Actor:        ${{ github.actor }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Reason:       ${{ github.event.inputs.reason }}"
            echo "Clean slate:  ${{ github.event.inputs.clean_slate }}"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Add .htaccess for SPA routing
        run: |
          cat > dist/.htaccess << 'HTACCESS'
          # SPA routing for React Router
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>

          # Cache hashed assets aggressively
          <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType text/css "access plus 1 year"
            ExpiresByType application/javascript "access plus 1 year"
            ExpiresByType image/png "access plus 1 year"
            ExpiresByType image/jpeg "access plus 1 year"
            ExpiresByType image/svg+xml "access plus 1 year"
            ExpiresByType image/webp "access plus 1 year"
            ExpiresByType font/woff2 "access plus 1 year"
          </IfModule>

          # Never cache index.html
          <FilesMatch "index\.html$">
            <IfModule mod_headers.c>
              Header set Cache-Control "no-cache, no-store, must-revalidate"
            </IfModule>
          </FilesMatch>

          # Gzip compression
          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json image/svg+xml
          </IfModule>
          HTACCESS

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./dist/
          dangerous-clean-slate: ${{ github.event.inputs.clean_slate == 'true' }}
          log-level: minimal

      - name: Verify live site shows new build
        env:
          SITE_URL: https://schooldirect.org
          EXPECTED_TEXT: "School Direct"
        run: |
          set -euo pipefail

          echo "Waiting 20s for FTP/CDN to settle…"
          sleep 20

          echo "==> Step 1: Fetch homepage and check it returns 200"
          HTML=""
          for i in 1 2 3 4 5; do
            echo "Attempt $i: GET $SITE_URL/"
            if HTML=$(curl -fsSL --max-time 20 -H 'Cache-Control: no-cache' "$SITE_URL/?cachebust=$(date +%s)"); then
              echo "Homepage OK ($(echo "$HTML" | wc -c) bytes)"
              break
            fi
            echo "Homepage not reachable yet, retrying in 10s…"
            sleep 10
          done
          if [ -z "$HTML" ]; then
            echo "::error::Homepage $SITE_URL never returned 200 after 5 attempts."
            exit 1
          fi

          echo "==> Step 2: Locate the JS bundle reference inside index.html"
          # Vite emits something like /assets/index-XXXXXXXX.js — pick the first match.
          BUNDLE=$(echo "$HTML" | grep -oE '/assets/[A-Za-z0-9_.-]+\.js' | head -n1 || true)
          if [ -z "$BUNDLE" ]; then
            echo "::error::Could not find a /assets/*.js reference in the deployed index.html."
            echo "----- index.html (first 200 lines) -----"
            echo "$HTML" | head -n 200
            exit 1
          fi
          echo "Found bundle: $BUNDLE"

          echo "==> Step 3: Download bundle and check it contains \"$EXPECTED_TEXT\""
          BUNDLE_URL="${SITE_URL}${BUNDLE}"
          if ! curl -fsSL --max-time 30 "$BUNDLE_URL" -o /tmp/bundle.js; then
            echo "::error::Failed to download bundle at $BUNDLE_URL"
            exit 1
          fi

          if grep -q "$EXPECTED_TEXT" /tmp/bundle.js; then
            echo "::notice::Live site is serving the new build — \"$EXPECTED_TEXT\" found in $BUNDLE."
          else
            echo "::error::Deploy verification FAILED — \"$EXPECTED_TEXT\" not found in $BUNDLE."
            echo "The FTP upload may have skipped files, or your CDN/cPanel is still serving an older bundle."
            exit 1
          fi
